<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScholarFlow — AI Native PPT 编辑器</title>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #fafbfc;
  --surface: #f0f2f5;
  --surface2: #e8eaef;
  --border: #dde1e6;
  --text: #1a1d23;
  --text2: #5f6570;
  --text3: #8b8f98;
  --accent: #2563eb;
  --accent2: #1d4ed8;
  --accent-light: #eff6ff;
  --accent-bar: #3b82f6;
  --green: #10b981;
  --green-light: #ecfdf5;
  --amber: #f59e0b;
  --amber-light: #fffbeb;
  --red: #ef4444;
  --red-light: #fef2f2;
  --blue: #93c5fd;
  --blue-light: #eff6ff;
  --shadow: 0 1px 3px rgba(0,0,0,.05);
  --shadow-lg: 0 4px 12px rgba(0,0,0,.07);
  --shadow-slide: 0 2px 16px rgba(0,0,0,.08);
  --radius: 10px;
  --radius-sm: 6px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
}
html, body { height: 100%; }
body {
  font-family: var(--font);
  font-size: 14px;
  font-weight: 400;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

h2 { font-size: 18px; font-weight: 600; letter-spacing: -0.2px; }
h3 { font-size: 14px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
h4 { font-size: 15px; font-weight: 600; }

/* ===== Top Bar ===== */
.topbar {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 24px; background: var(--surface);
  border-bottom: 2px solid var(--accent-light);
  z-index: 10;
}
.topbar .logo {
  font-size: 20px; font-weight: 700;
  color: var(--accent);
}
.topbar .sep { flex: 1; }
.topbar .badge {
  font-size: 12px; padding: 5px 12px; border-radius: 20px;
  background: var(--accent-light); color: var(--accent); font-weight: 600;
}

/* ===== Steps Bar ===== */
.steps {
  display: flex; gap: 0; padding: 18px 24px 0;
  background: var(--surface); border-bottom: 1px solid var(--border);
  overflow-x: auto;
}
.step {
  flex-shrink: 0; padding: 12px 22px; font-size: 14px; font-weight: 500;
  color: var(--text2); cursor: pointer; border-bottom: 3px solid transparent;
  transition: all .2s; white-space: nowrap;
  display: flex; align-items: center; gap: 8px;
}
.step .num {
  width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  background: #e8eaef; color: var(--text2); font-size: 11px;
  transition: all .2s;
}
.step.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
.step.active .num { background: var(--accent); color: #fff; }
.step.done { color: var(--green); }
.step.done .num { background: var(--green); color: #fff; }
.step:hover:not(.active) { color: var(--text); border-bottom-color: var(--accent-light); }

/* ===== Main Area ===== */
.main {
  flex: 1; display: flex; overflow: hidden; position: relative;
}

/* ===== Panels ===== */
.panel {
  display: none; flex-direction: column;
  position: absolute; inset: 0;
  padding: 32px; overflow-y: auto;
}
.panel.active { display: flex; }

/* Upload panel */
.upload-zone {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 18px;
  border: 2px dashed var(--accent-light); border-radius: var(--radius);
  margin: 20px; cursor: pointer; transition: all .2s;
  background: var(--surface2);
}
.upload-zone:hover { border-color: var(--accent); background: var(--blue-light); }
.upload-zone.drag { border-color: var(--accent); background: var(--accent-light); }
.upload-icon {
  font-size: 14px; font-weight: 700; letter-spacing: 2px;
  color: var(--accent); background: var(--accent-light);
  padding: 10px 20px; border-radius: 4px;
}
.upload-text { font-size: 17px; font-weight: 500; color: var(--text); }
.upload-hint { font-size: 13px; color: var(--text3); }
.uploaded-file {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 22px; background: var(--green-light); border-radius: var(--radius-sm);
  border: 1px solid #a7f3d0;
}
.uploaded-file .uploaded-icon {
  font-size: 12px; font-weight: 700; letter-spacing: 1px;
  color: var(--accent); background: var(--accent-light);
  padding: 6px 14px; border-radius: 4px;
}
.uploaded-file .name { font-weight: 600; font-size: 15px; }
.uploaded-file .meta { font-size: 13px; color: var(--text3); }

/* Focus selection */
.focus-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;
  flex: 1; align-content: center; max-width: 680px; margin: 0 auto;
}
.focus-card {
  padding: 26px; border: 2px solid var(--border); border-radius: var(--radius);
  cursor: pointer; transition: all .2s;
  background: var(--surface);
}
.focus-card:hover { border-color: var(--accent); }
.focus-card.selected { border-color: var(--accent); background: var(--blue-light); }
.focus-card .focus-label {
  font-size: 11px; font-weight: 600; color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 8px; display: block;
}
.focus-card .title { font-weight: 600; font-size: 16px; margin-bottom: 6px; color: var(--text); }
.focus-card .desc { font-size: 13px; color: var(--text3); line-height: 1.6; }
.focus-card .checkmark {
  display: none; float: right;
  width: 20px; height: 20px; border-radius: 50%; background: var(--accent);
  color: #fff; text-align: center; line-height: 20px; font-size: 11px; font-weight: 700;
}
.focus-card.selected .checkmark { display: inline-block; }
.focus-card.selected .focus-label { color: var(--accent); }

/* Blueprint panel */
.blueprint-layout {
  display: flex; gap: 20px; flex: 1; overflow: hidden;
}
.tree-panel {
  flex: 1; max-width: 420px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 22px; overflow-y: auto;
}
.tree-panel h3 { font-size: 15px; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
.tree-node {
  margin-left: 0; user-select: none;
}
.tree-node .row {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 10px; border-radius: 6px;
  cursor: grab; transition: background .15s; font-size: 14px;
}
.tree-node .row:hover { background: var(--accent-light); }
.tree-node .row.dragging { opacity: .4; }
.tree-node .row.drag-over { background: var(--blue-light); outline: 2px dashed var(--accent); border-radius: 6px; }
.tree-node .row .toggle { width: 18px; cursor: pointer; color: var(--text2); font-size: 11px; }
.tree-node .row .label { flex: 1; }
.tree-node .row .label input {
  border: none; background: transparent; font-size: 14px; font-family: var(--font);
  width: 100%; padding: 2px 4px; border-radius: 4px;
}
.tree-node .row .label input:focus { outline: none; background: #fff; box-shadow: 0 0 0 2px var(--accent); }
.tree-node .row .actions { display: flex; gap: 4px; opacity: 0; transition: opacity .15s; }
.tree-node .row:hover .actions { opacity: 1; }
.tree-node .row .actions button {
  width: 26px; height: 26px; border: none; background: transparent;
  cursor: pointer; border-radius: 4px; font-size: 13px; color: var(--text2);
}
.tree-node .row .actions button:hover { background: var(--accent-light); color: var(--red); }
.tree-node .children { margin-left: 20px; border-left: 2px solid var(--accent-light); padding-left: 10px; }
.preview-panel {
  flex: 2; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 22px; overflow-y: auto;
  display: flex; flex-direction: column;
}
.preview-panel h3 { font-size: 15px; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
.preview-slide {
  background: #fff; border: 1px solid var(--border); border-radius: 8px;
  box-shadow: var(--shadow-slide);
  overflow: hidden;
  aspect-ratio: 16 / 9;
  max-width: 800px; width: 100%;
  position: relative;
}
.preview-slide .slide-accent-bar {
  height: 5px; background: var(--accent-bar);
}
.preview-slide .slide-inner {
  padding: 20px 28px;
}
.preview-slide .slide-page-num {
  position: absolute; bottom: 8px; right: 16px;
  font-size: 10px; color: #b0b5bd; font-weight: 500;
}
.preview-slide .slide-title {
  font-size: 20px; font-weight: 700; margin-bottom: 14px;
  color: var(--text); letter-spacing: -0.3px;
  padding-bottom: 10px; border-bottom: 2px solid #e2e5ea;
}
.preview-slide .slide-body {
  font-size: 13px; line-height: 1.7; color: #4a4d55;
}
.preview-slide .slide-body ul { padding-left: 1.2em; list-style: none; }
.preview-slide .slide-body ul li { margin-bottom: 8px; position: relative; }
.preview-slide .slide-body ul li::before { content: '•'; position: absolute; left: -1em; color: var(--accent); font-weight: 700; }
.preview-slide .slide-body .placeholder { color: #b8bcc4; font-style: italic; }
.preview-slide .slide-body b { color: var(--text); }
.preview-slide .slide-body table { font-size: 13px; width: 100%; border-collapse: collapse; margin: 8px 0; }
.preview-slide .slide-body table th { background: #fff; padding: 7px 10px; text-align: left; font-weight: 600; }
.preview-slide .slide-body table td { padding: 6px 10px; border-bottom: 1px solid #e2e5ea; }

/* Stacked slides (multi-page preview) */
.preview-slides-stack {
  display: flex; flex-direction: column; gap: 20px;
}
.stacked-slide {
  background: #fff; border: 1px solid var(--border); border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
  overflow: hidden; position: relative;
  aspect-ratio: 16 / 9;
  max-width: 750px; width: 100%;
  flex-shrink: 0;
}
.stacked-slide .slide-accent-bar { height: 3px; background: var(--accent-bar); }
.stacked-slide .slide-inner { padding: 16px 24px; }
.stacked-slide .slide-title {
  font-size: 17px; font-weight: 700; margin-bottom: 10px;
  color: var(--text); padding-bottom: 8px; border-bottom: 2px solid #e2e5ea;
}
.stacked-slide .slide-body { font-size: 12px; line-height: 1.7; color: #4a4d55; }
.stacked-slide .slide-body ul { padding-left: 1.2em; list-style: none; }
.stacked-slide .slide-body ul li { margin-bottom: 4px; position: relative; }
.stacked-slide .slide-body ul li::before { content: '•'; position: absolute; left: -1em; color: var(--accent); font-weight: 700; }
.stacked-slide .slide-body .placeholder { color: #b8bcc4; font-style: italic; }
.stacked-slide .slide-body b { color: var(--text); }
.stacked-slide .slide-body table { font-size: 11px; width: 100%; border-collapse: collapse; margin: 4px 0; }
.stacked-slide .slide-body table th { background: #fff; padding: 4px 6px; text-align: left; font-weight: 600; }
.stacked-slide .slide-body table td { padding: 3px 6px; border-bottom: 1px solid #e2e5ea; }
.stacked-slide .slide-page-num {
  position: absolute; bottom: 6px; right: 12px;
  font-size: 10px; color: #b0b5bd; font-weight: 500;
}
.stacked-slide code {
  font-family: 'SF Mono', Consolas, monospace; font-size: 11px;
  line-height: 1.6; white-space: pre-wrap;
}

/* Workshop panel */
.workshop-layout {
  display: flex; gap: 20px; flex: 1; overflow: hidden;
}
.workshop-cards {
  flex: 2; display: flex; flex-wrap: wrap; gap: 14px; overflow-y: auto;
  align-content: flex-start; padding: 4px;
}
.task-card {
  width: calc(50% - 7px); background: var(--surface);
  border: 2px solid var(--border); border-radius: var(--radius);
  padding: 18px; transition: all .2s;
}
.task-card.running { border-left: 4px solid var(--accent); }
.task-card.paused { border-left: 4px solid var(--amber); background: var(--amber-light); }
.task-card.done { border-left: 4px solid var(--green); opacity: .85; }
.task-card .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.task-card .card-header .card-tag {
  font-size: 10px; font-weight: 600; color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.4px;
  background: var(--accent-light); padding: 2px 8px; border-radius: 3px;
}
.task-card .card-header .card-title { font-weight: 600; font-size: 13px; flex: 1; }
.task-card .card-header .card-status {
  font-size: 12px; padding: 4px 10px; border-radius: 14px; font-weight: 500;
}
.task-card.running .card-status { background: var(--accent-light); color: var(--accent); }
.task-card.paused .card-status { background: var(--amber-light); color: var(--amber); }
.task-card.done .card-status { background: var(--green-light); color: var(--green); }
.task-card .card-preview {
  font-size: 13px; color: var(--text2); line-height: 1.6;
  max-height: 66px; overflow: hidden; margin-bottom: 12px;
  white-space: pre-wrap;
}
.task-card .card-bar {
  height: 5px; background: #e8eaef; border-radius: 3px; margin-bottom: 12px;
  overflow: hidden;
}
.task-card .card-bar .fill {
  height: 100%; border-radius: 3px; transition: width .3s;
  background: var(--accent);
}
.task-card.paused .card-bar .fill { background: var(--amber); }
.task-card.done .card-bar .fill { background: var(--green); }
.task-card .card-actions { display: flex; gap: 8px; }
.task-card .card-actions button {
  padding: 6px 14px; border: 1px solid var(--border); border-radius: 18px;
  background: #fff; font-size: 12px; cursor: pointer; transition: all .15s;
  font-family: var(--font);
}
.task-card .card-actions button:hover { background: var(--accent-light); }
.task-card .card-actions button.pause-btn { color: var(--amber); border-color: #fcd34d; }
.task-card .card-actions button.resume-btn { color: var(--accent); border-color: var(--blue); }
.task-card .card-actions button.edit-btn { color: var(--accent2); border-color: var(--blue); }

/* 修改指令 instruction modal */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.35); z-index: 100;
  align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: var(--surface); border-radius: var(--radius);
  padding: 28px; width: 500px;
}
.modal-box h4 { margin-bottom: 14px; font-size: 16px; }
.modal-box textarea {
  width: 100%; height: 110px; border: 2px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px; font-size: 14px;
  font-family: var(--font); resize: vertical;
}
.modal-box textarea:focus { outline: none; border-color: var(--accent); }
.modal-box .btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 14px; }
.modal-box .btns button {
  padding: 10px 22px; border-radius: 8px; border: none;
  cursor: pointer; font-size: 14px; font-weight: 500; font-family: var(--font);
}
.modal-box .btns .cancel { background: #e8eaef; color: var(--text); }
.modal-box .btns .confirm { background: var(--accent); color: #fff; }
.modal-box .btns .confirm:hover { background: var(--accent2); }

/* Review panel */
.review-layout { display: flex; gap: 20px; flex: 1; overflow: hidden; }
.review-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
.review-item {
  padding: 18px; border-radius: var(--radius-sm); border: 2px solid var(--border);
  background: var(--surface); cursor: pointer; transition: all .15s;
  display: flex; align-items: flex-start; gap: 14px;
}
.review-item:hover { border-color: var(--accent); }
.review-item .sev {
  padding: 5px 10px; border-radius: 14px; font-size: 12px; font-weight: 600;
  white-space: nowrap;
}
.review-item .sev.warn { background: var(--amber-light); color: #d97706; }
.review-item .sev.info { background: var(--accent-light); color: var(--accent2); }
.review-item .sev.err { background: var(--red-light); color: #dc2626; }
.review-item .body { flex: 1; font-size: 14px; line-height: 1.7; }
.review-item .body strong { display: block; margin-bottom: 4px; }
.review-detail {
  flex: 1.5; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 22px; overflow-y: auto;
}

/* Export panel */
.export-content {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 24px; text-align: center;
}
.export-card {
  background: var(--surface); border: 2px solid var(--accent-light);
  border-radius: var(--radius); padding: 40px 56px;
}
.export-card .check-icon {
  width: 56px; height: 56px; border-radius: 50%; background: var(--green);
  margin: 0 auto 16px; position: relative;
}
.export-card .check-icon::after {
  content: ''; position: absolute; top: 16px; left: 20px;
  width: 16px; height: 8px; border-left: 3px solid #0f1117;
  border-bottom: 3px solid #0f1117;
  transform: rotate(-45deg);
}
.export-card h2 { font-size: 22px; margin-bottom: 10px; }
.export-card p { font-size: 14px; color: var(--text2); margin-bottom: 24px; }
.export-btns { display: flex; gap: 14px; }
.export-btns button {
  padding: 12px 28px; border-radius: 10px; border: none;
  cursor: pointer; font-size: 15px; font-weight: 600; font-family: var(--font);
  transition: all .15s;
}
.export-btns .btn-pptx { background: var(--accent); color: #fff; }
.export-btns .btn-pptx:hover { background: var(--accent2); }
.export-btns .btn-pdf { background: #1e1e1e; color: #fff; }
.export-btns .btn-pdf:hover { background: #333; }
.export-btns .btn-history { background: #fff; color: var(--text); border: 2px solid var(--border); }
.export-btns .btn-history:hover { background: var(--accent-light); }

/* ===== Bottom action bar ===== */
.action-bar {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 24px; background: var(--surface);
  border-top: 2px solid var(--accent-light); z-index: 10;
}
.action-bar .hint { font-size: 13px; color: var(--text2); flex: 1; }
.action-bar button {
  padding: 11px 26px; border-radius: 10px; border: none;
  cursor: pointer; font-size: 15px; font-weight: 600; font-family: var(--font);
  transition: all .15s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); }
.btn-primary:disabled { background: #ccc; cursor: not-allowed; }
.btn-secondary { background: #fff; color: var(--text); border: 2px solid var(--border); }
.btn-secondary:hover { background: var(--accent-light); }

/* ===== Toast ===== */
.toast {
  position: fixed; top: 20px; right: 20px; z-index: 200;
  padding: 14px 22px; background: #1a1d23; color: #fff;
  border-radius: 10px; font-size: 14px; font-weight: 500;
  pointer-events: none; opacity: 0; transform: translateY(-10px);
  transition: all .3s;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ===== Animations ===== */
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
.pulse { animation: pulse 1.5s infinite; }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeInUp .4s ease; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Responsive */
@media (max-width: 768px) {
  .focus-grid { grid-template-columns: 1fr; }
  .blueprint-layout { flex-direction: column; }
  .tree-panel { max-width: none; }
  .workshop-layout { flex-direction: column; }
  .task-card { width: 100%; }
  .review-layout { flex-direction: column; }
}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <span class="logo">ScholarFlow</span>
  <span style="font-size:13px;color:var(--text3);">AI Native PPT 编辑器</span>
  <span class="sep"></span>
  <span class="badge">Demo</span>
</div>

<!-- Steps -->
<div class="steps" id="stepsBar">
  <div class="step active" data-step="0"><span class="num">1</span>上传论文</div>
  <div class="step" data-step="1"><span class="num">2</span>选择侧重点</div>
  <div class="step" data-step="2"><span class="num">3</span>叙事蓝图</div>
  <div class="step" data-step="3"><span class="num">4</span>并行生成</div>
  <div class="step" data-step="4"><span class="num">5</span>总览检查</div>
  <div class="step" data-step="5"><span class="num">6</span>导出</div>
</div>

<!-- Main Content -->
<div class="main" id="mainContent"></div>

<!-- Action Bar -->
<div class="action-bar" id="actionBar">
  <span class="hint" id="actionHint">拖拽 PDF 文件到此处，或点击上传</span>
  <button class="btn-secondary" id="btnReset" onclick="resetAll()" style="display:none;">重新开始</button>
  <button class="btn-primary" id="btnNext" disabled onclick="nextStep()">下一步</button>
</div>

<!-- 修改指令 Instruction Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <h4>修改生成指令</h4>
    <textarea id="editInstruction" placeholder="输入新的生成指令..."></textarea>
    <div class="btns">
      <button class="cancel" onclick="close修改指令Modal()">取消</button>
      <button class="confirm" onclick="confirm修改指令Instruction()">保存并恢复生成</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ==================== State ====================
const STATE = {
  step: 0,
  uploadedFile: null,
  selectedFocus: null,
  blueprint: null,
  tasks: [],
  reviewItems: [],
  editingTaskId: null,

// 默认内容（上传论文后初始状态使用）
const DEFAULT_SLIDE_CONTENTS = SLIDE_CONTENTS['overview'];

// 根据当前选中的 focus mode 获取对应内容，未选择时 fallback 到 overview
function getFocusContents() {
  const mode = STATE.selectedFocus || 'overview';
  return SLIDE_CONTENTS[mode] || SLIDE_CONTENTS['overview'];
}

// 获取某个章节在当前 focus mode 下的所有页面
function getSectionPages(sectionId) {
  const mode = STATE.selectedFocus || 'overview';
  const modePages = SECTION_PAGES[mode] || SECTION_PAGES['overview'];
  return modePages[sectionId] || SECTION_PAGES['overview'][sectionId] || [];
}

// 渲染可滚动的多页幻灯片堆叠
function renderSlideStack(sectionId) {
  const pages = getSectionPages(sectionId);
  if (!pages.length) return '<span class="placeholder">该章节暂无预览页面</span>';
  const pageMap = { 'bg': 2, 'method': 5, 'result': 8, 'disc': 11, 'conc': 14 };
  const baseNum = pageMap[sectionId] || 1;
  return pages.map((p, i) => `
    <div class="stacked-slide">
      <div class="slide-accent-bar"></div>
      <div class="slide-inner">
        <div class="slide-title">${p.title}</div>
        <div class="slide-body">${p.body}</div>
      </div>
      <div class="slide-page-num">第 ${baseNum + i} / 15 页</div>
    </div>
  `).join('');
}

// ==================== Render ====================
function renderPanel() {
  const main = document.getElementById('mainContent');
  const s = STATE.step;

  if (s === 0) main.innerHTML = renderUpload();
  else if (s === 1) main.innerHTML = renderFocus();
  else if (s === 2) main.innerHTML = renderBlueprint();
  else if (s === 3) main.innerHTML = renderWorkshop();
  else if (s === 4) main.innerHTML = renderReview();
  else if (s === 5) main.innerHTML = renderExport();

  updateSteps();
  updateActionBar();
  bindPanelEvents();
}

// ==================== Tree Operations ====================
function toggleTreeNode(id) {
  const children = document.getElementById('children-' + id);
  if (children) {
    children.style.display = children.style.display === 'none' ? '' : 'none';
    const toggle = document.querySelector(`[data-node-id="${id}"] .toggle`);
    if (toggle) toggle.innerHTML = children.style.display === 'none' ? '&#9654;' : '&#9660;';
  }
}

function renameNode(id, newLabel) {
  const bp = STATE.blueprint;
  function walk(nodes) {
    for (const n of nodes) {
      if (n.id === id) { n.label = newLabel; return true; }
      if (n.children && walk(n.children)) return true;
    }
    return false;
  }
  walk(bp);
  // Sync task title
  const task = STATE.tasks.find(t => t.id === id);
  if (task) task.title = newLabel;
}

function addChildNode(parentId) {
  const bp = STATE.blueprint;
  function walk(nodes) {
    for (const n of nodes) {
      if (n.id === parentId) {
        if (!n.children) n.children = [];
        const newId = parentId + '-c' + (n.children.length + 1);
        n.children.push({ id: newId, label: '新节点', children: [] });
        return true;
      }
      if (n.children && walk(n.children)) return true;
    }
    return false;
  }
  walk(bp);
  renderPanel();
  showToast('已添加子节点');
}

function deleteNode(id) {
  if (!confirm('确定删除该节点及其所有子节点？')) return;
  const bp = STATE.blueprint;
  function walk(nodes) {
    const idx = nodes.findIndex(n => n.id === id);
    if (idx >= 0) { nodes.splice(idx, 1); return true; }
    for (const n of nodes) { if (n.children && walk(n.children)) return true; }
    return false;
  }
  walk(bp);
  renderPanel();
  showToast('节点已删除，蓝图已更新');
}

// ==================== Task Operations ====================
function pauseTask(id) {
  const task = STATE.tasks.find(t => t.id === id);
  if (task) task.status = 'paused';
  updateWorkshopCards();
  showToast(`"${task.title}" 已暂停，其他任务继续运行`);
}

function resumeTask(id) {
  const task = STATE.tasks.find(t => t.id === id);
  if (task) {
    task.status = 'running';
    updateWorkshopCards();
    showToast(`"${task.title}" 已恢复，按新指令重新生成`);
    // Simulate progress
    simulateProgress(id);
  }
}

function editTaskInstruction(id) {
  STATE.editingTaskId = id;
  const task = STATE.tasks.find(t => t.id === id);
  document.getElementById('editInstruction').value = task?.instruction || '';
  document.getElementById('editModal').classList.add('show');
}

function close修改指令Modal() {
  document.getElementById('editModal').classList.remove('show');
  STATE.editingTaskId = null;
}

function confirm修改指令Instruction() {
  const id = STATE.editingTaskId;
  const newInst = document.getElementById('editInstruction').value;
  if (id && newInst) {
    const task = STATE.tasks.find(t => t.id === id);
    if (task) {
      task.instruction = newInst;
      task.progress = 0;
      task.preview = '';
      task.status = 'running';
      updateWorkshopCards();
      showToast(`"${task.title}" 指令已更新，重新生成中...`);
      simulateProgress(id);
    }
  }
  close修改指令Modal();
}

function simulateProgress(id) {
  const task = STATE.tasks.find(t => t.id === id);
  if (!task || task.status !== 'running') return;

  const interval = setInterval(() => {
    if (task.status !== 'running') { clearInterval(interval); return; }
    task.progress += Math.random() * 6 + 3;
    if (task.progress >= 100) {
      task.progress = 100;
      task.status = 'done';
      task.preview = generatePreview(task.id);
      clearInterval(interval);
      refreshTaskCard(id);
      checkAllTasksDone();
    } else {
      task.preview = generatePartialPreview(task.id, task.progress);
      refreshTaskCard(id);
    }
  }, 1200);
}

function generatePartialPreview(id, progress) {
  const full = generatePreview(id);
  const chars = Math.floor(full.length * progress / 100);
  return full.substring(0, chars) + '...';
}

// 仅更新单张卡片的进度条和预览文本，不重建DOM，消除闪烁
function refreshTaskCard(id) {
  const task = STATE.tasks.find(t => t.id === id);
  if (!task) return;
  const card = document.getElementById('card-' + id);
  if (!card) return;

  // 更新进度条宽度
  const bar = card.querySelector('.card-bar .fill');
  if (bar) {
    const progress = task.status === 'done' ? 100 : Math.min(task.progress, 95);
    bar.style.width = progress + '%';
  }

  // 更新预览文本
  const previewEl = card.querySelector('.card-preview');
  if (previewEl) {
    previewEl.textContent = task.preview || '正在生成中...';
  }

  // 如果任务完成，更新状态标签和边框样式
  if (task.status === 'done') {
    card.classList.remove('running');
    card.classList.add('已完成');
    const statusEl = card.querySelector('.card-status');
    if (statusEl) {
      statusEl.textContent = '已完成';
      statusEl.style.background = 'var(--green-light)';
      statusEl.style.color = 'var(--green)';
    }
    // 替换操作按钮为完成标记
    const actionsEl = card.querySelector('.card-actions');
    if (actionsEl) {
      actionsEl.outerHTML = '<div style="font-size:12px;color:var(--green);font-weight:500;">生成完成</div>';
    }
  }
}

function checkAllTasksDone() {
  if (STATE.tasks.every(t => t.status === 'done')) {
    showToast('全部章节生成完成，可以进入总览检查');
  }
}

// ==================== Review ====================
function focusReviewItem(id) {
  const item = STATE.reviewItems.find(r => r.id === id);
  if (!item) return;
  const detail = document.getElementById('reviewDetail');
  const task = STATE.tasks.find(t => t.id === item.targetTask);

  // 更新审查详情
  if (detail) {
    detail.innerHTML = `
      <h4 style="margin-bottom:10px;">${item.label}</h4>
      <p style="font-size:14px;color:var(--text2);line-height:1.8;margin-bottom:18px;">${item.detail}</p>
      <div style="background:var(--accent-light);padding:14px;border-radius:8px;">
        <strong style="font-size:13px;">关联章节：</strong>
        <span style="font-size:14px;">${task ? task.title : '—'}</span>
        <button onclick="showToast('已跳转到「${task?.title || ''}」章节工坊卡片（模拟）')" style="margin-left:10px;padding:5px 14px;border:2px solid var(--accent);border-radius:14px;background:var(--blue-light);color:var(--accent);cursor:pointer;font-size:12px;font-family:var(--font);">跳转修改</button>
      </div>
    `;
  }

  // 更新关联PPT页面预览（多页堆叠）
  const slideStack = document.getElementById('reviewSlidesStack');
  if (slideStack && task) {
    slideStack.innerHTML = renderSlideStack(task.id) || '<div class="stacked-slide"><div class="slide-inner"><span class="placeholder">该章节内容可在工坊中查看</span></div></div>';
  }
}

function resolveReview(id) {
  const item = STATE.reviewItems.find(r => r.id === id);
  if (item) {
    item.resolved = true;
    renderPanel();
    showToast('已标记为已处理');
  }
}

// ==================== Navigation ====================
function nextStep() {
  if (STATE.step === 0 && !STATE.uploadedFile) return;
  if (STATE.step === 1 && !STATE.selectedFocus) return;
  if (STATE.step < 5) {
    STATE.step++;
    if (STATE.step === 2) {
      STATE.blueprint = JSON.parse(JSON.stringify(INITIAL_BLUEPRINT));
      showToast('AI 已生成叙事蓝图，你可以拖拽调整结构');
    }
    if (STATE.step === 3) {
      initWorkshop();
      showToast('已启动 5 个并行智能体，开始生成各章节');
    }
    if (STATE.step === 4) {
      STATE.reviewItems = REVIEW_ITEMS.map(r => ({...r, resolved: false}));
      showToast('AI 审查智能体已启动，发现 ' + STATE.reviewItems.length + ' 条建议');
    }
    renderPanel();
  }
}

function prevStep() {
  if (STATE.step > 0) {
    STATE.step--;
    renderPanel();
  }
}

function goToStep(n) {
  STATE.step = n;
  if (n === 2 && !STATE.blueprint) STATE.blueprint = JSON.parse(JSON.stringify(INITIAL_BLUEPRINT));
  if (n === 3 && STATE.tasks.length === 0) initWorkshop();
  if (n === 4 && STATE.reviewItems.length === 0) STATE.reviewItems = REVIEW_ITEMS.map(r => ({...r, resolved: false}));
  renderPanel();
}

function updateSteps() {
  const steps = document.querySelectorAll('#stepsBar .step');
  steps.forEach((el, i) => {
    el.classList.remove('active', '已完成');
    if (i < STATE.step) el.classList.add('已完成');
    if (i === STATE.step) el.classList.add('active');
    el.onclick = () => goToStep(i);
  });
}

function updateActionBar() {
  const btn = document.getElementById('btnNext');
  const hint = document.getElementById('actionHint');
  const resetBtn = document.getElementById('btnReset');

  if (resetBtn) resetBtn.style.display = STATE.step > 0 ? '' : 'none';

  if (STATE.step === 0) {
    btn.disabled = !STATE.uploadedFile;
    hint.textContent = STATE.uploadedFile ? '论文已上传，点击下一步' : '拖拽 PDF 文件到此处，或点击上传';
  } else if (STATE.step === 1) {
    btn.disabled = !STATE.selectedFocus;
    hint.textContent = STATE.selectedFocus ? '已选择侧重点，点击下一步生成蓝图' : '请选择一种解读模式';
  } else if (STATE.step === 2) {
    btn.disabled = false;
    hint.textContent = '调整蓝图后点击下一步，启动并行生成';
  } else if (STATE.step === 3) {
    const allDone = STATE.tasks.length > 0 && STATE.tasks.every(t => t.status === 'done');
    btn.disabled = !allDone;
    hint.textContent = allDone ? '全部章节生成完毕，进入审查' : '等待所有智能体完成，或手动暂停/修改指令...';
  } else if (STATE.step === 4) {
    btn.disabled = false;
    hint.textContent = '处理审查建议后，点击下一步导出';
  } else if (STATE.step === 5) {
    btn.style.display = 'none';
    hint.textContent = '选择导出格式完成演示';
  }
}

// ==================== Init Workshop ====================
function initWorkshop() {
  const focusModeName = FOCUS_MODES.find(f => f.id === STATE.selectedFocus)?.title || '综述概览';
  STATE.tasks = TASK_DEFS.map(t => ({
    ...t,
    status: 'running',
    progress: 0,
    preview: '',
    instruction: `在「${focusModeName}」模式下生成「${t.title}」章节的幻灯片内容。`,
    tag: t.tag,
  }));
  // Trigger simulations
  setTimeout(() => {
    STATE.tasks.forEach(t => {
      if (t.status === 'running') simulateProgress(t.id);
    });
  }, 500);
}

// ==================== Panel Events ====================
function bindPanelEvents() {
  // Upload step
  const zone = document.getElementById('uploadZone');
  if (zone) {
    zone.addEventListener('click', () => simulateUpload());
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag');
      simulateUpload();
    });
  }

  // Focus cards
  document.querySelectorAll('.focus-card').forEach(card => {
    card.addEventListener('click', () => {
      STATE.selectedFocus = card.dataset.focus;
      renderPanel();
    });
  });

  // Tree node drag & drop (step 2)
  if (STATE.step === 2) initDragDrop();

  // Workshop task card clicks (step 3)
  document.querySelectorAll('.task-card').forEach(card => {
    card.addEventListener('click', function(e) {
      if (e.target.tagName === 'BUTTON') return;
      const id = this.id.replace('card-', '');
      const task = STATE.tasks.find(t => t.id === id);
      if (task) {
        const stack = document.getElementById('workshopSlidesStack');
        if (stack) {
          stack.innerHTML = renderSlideStack(id) || '<div class="stacked-slide"><div class="slide-inner"><span class="placeholder">内容生成中...</span></div></div>';
        }
      }
    });
  });

  // Blueprint tree node clicks (step 2)
  document.querySelectorAll('.tree-node .row').forEach(row => {
    row.addEventListener('click', function(e) {
      if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT' || e.target.classList.contains('toggle')) return;
      const id = this.dataset.nodeId;
      if (id) {
        const stack = document.getElementById('previewSlidesStack');
        if (stack) {
          stack.innerHTML = renderSlideStack(id);
        }
      }
    });
  });
}

function simulateUpload() {
  STATE.uploadedFile = {
    name: '篮球鞋足趾动态设计与膝关节运动反应的生物力学研究_周辉宇.pdf',
    pages: 10,
    size: '2.4 MB',
  };
  renderPanel();
  showToast('论文已解析，共 10 页，识别出 5 个主要章节');
}

function initDragDrop() {
  let dragged = null;

  document.querySelectorAll('.tree-node .row').forEach(row => {
    row.addEventListener('dragstart', function(e) {
      dragged = this;
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', this.dataset.nodeId);
    });

    row.addEventListener('dragend', function() {
      this.classList.remove('dragging');
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      dragged = null;
    });

    row.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (this !== dragged) this.classList.add('drag-over');
    });

    row.addEventListener('dragleave', function() {
      this.classList.remove('drag-over');
    });

    row.addEventListener('drop', function(e) {
      e.preventDefault();
      e.stopPropagation();
      this.classList.remove('drag-over');
      if (dragged && this !== dragged) {
        const srcId = dragged.dataset.nodeId;
        const dstId = this.dataset.nodeId;
        moveNode(srcId, dstId);
      }
    });
  });
}

function moveNode(srcId, dstId) {
  const bp = STATE.blueprint;
  let srcNode = null, srcParent = null, srcIdx = -1;
  let dstParent = null, dstIdx = -1;

  function find(nodes, parent = null) {
    for (let i = 0; i < nodes.length; i++) {
      if (nodes[i].id === srcId) { srcNode = nodes[i]; srcParent = nodes; srcIdx = i; }
      if (nodes[i].id === dstId) { dstParent = nodes; dstIdx = i; }
      if (nodes[i].children) find(nodes[i].children, nodes[i]);
    }
  }
  find(bp);

  if (srcNode && dstParent && srcIdx >= 0 && dstIdx >= 0) {
    srcParent.splice(srcIdx, 1);
    // Adjust dstIdx if src was before dst in same parent
    const insertIdx = (srcParent === dstParent && srcIdx < dstIdx) ? dstIdx : dstIdx + 1;
    dstParent.splice(insertIdx, 0, srcNode);
    renderPanel();
    showToast('节点顺序已更新，内容区将自动重排');
  }
}

// ==================== Helpers ====================
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.classList.remove('show'), 2500);
}

function resetAll() {
  if (!confirm('确定重新开始？当前所有进度将被清除。')) return;
  STATE.step = 0;
  STATE.uploadedFile = null;
  STATE.selectedFocus = null;
  STATE.blueprint = null;
  STATE.tasks = [];
  STATE.reviewItems = [];
  document.getElementById('btnNext').style.display = '';
  renderPanel();
  showToast('已重置');
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowRight' && !e.ctrlKey && !e.metaKey) nextStep();
  if (e.key === 'ArrowLeft' && !e.ctrlKey && !e.metaKey) prevStep();
});

// ==================== Init ====================
renderPanel();
</script>
